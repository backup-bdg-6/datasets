# Main Configuration File for AI Model Training Workflow

# General Settings
project_name: "Advanced-AI-Model"
seed: 42
output_dir: "./outputs"
log_level: "INFO"

# Dataset Configuration
datasets:
  core_datasets:
    - name: "nvidia/OpenCodeReasoning"
      type: "huggingface"
      task: "code_reasoning"
      weight: 1.0
      
    - name: "openai/openai_humaneval"
      type: "huggingface"
      task: "code_generation"
      weight: 1.0
      
    - name: "bigcode/the-stack"
      type: "huggingface"
      task: "code_completion"
      weight: 1.0
      streaming: true
      max_samples: 1000000
      
    - name: "open-thoughts/OpenThoughts2-1M"
      type: "huggingface"
      task: "thought_process"
      weight: 0.8
      
    - name: "xAI/TruthfulQA"
      type: "huggingface"
      task: "truthfulness"
      weight: 1.2
      
    - name: "HuggingFaceH4/instruction-dataset"
      type: "huggingface"
      task: "instruction_following"
      weight: 1.5
      
    - name: "HuggingFaceH4/ultrachat_200k"
      type: "huggingface"
      task: "conversation"
      weight: 1.2
      
    - name: "Salesforce/dialogstudio"
      type: "huggingface"
      task: "dialogue"
      weight: 1.0
      
    - name: "Anthropic/hh-rlhf"
      type: "huggingface"
      task: "alignment"
      weight: 1.5
      
    - name: "allenai/dolma"
      type: "huggingface"
      task: "general_knowledge"
      weight: 0.8
      streaming: true
      max_samples: 1000000
      
    - name: "openwebtext/openwebtext"
      type: "huggingface"
      task: "web_text"
      weight: 0.7
      streaming: true
      max_samples: 500000
      
    - name: "meta-math/MetaMathQA"
      type: "huggingface"
      task: "math_reasoning"
      weight: 1.2
      
    - name: "lmsys/chatbot_arena_conversations"
      type: "huggingface"
      task: "conversation_benchmark"
      weight: 1.0
      
    - name: "open-orca/OpenOrca"
      type: "huggingface"
      task: "instruction_following"
      weight: 1.3
      
    - name: "teknium/Grok-3-Dataset"
      type: "huggingface"
      task: "diverse"
      weight: 1.0
      
    - name: "togethercomputer/RedPajama-Data-1T"
      type: "huggingface"
      task: "general_knowledge"
      weight: 0.7
      streaming: true
      max_samples: 1000000
      
    - name: "cerebras/SlimPajama-627B"
      type: "huggingface"
      task: "general_knowledge"
      weight: 0.7
      streaming: true
      max_samples: 500000
      
    - name: "EleutherAI/pile"
      type: "huggingface"
      task: "diverse_text"
      weight: 0.8
      streaming: true
      max_samples: 500000
      
    - name: "allenai/c4"
      type: "huggingface"
      task: "web_text"
      weight: 0.6
      streaming: true
      max_samples: 500000
      
    - name: "bigscience/xP3"
      type: "huggingface"
      task: "multilingual"
      weight: 1.0
      
    - name: "HuggingFaceTB/cosmopedia"
      type: "huggingface"
      task: "scientific_knowledge"
      weight: 0.9
      
    - name: "xAI/xAI-WildChat"
      type: "huggingface"
      task: "conversation"
      weight: 1.1
      
    - name: "google-research/FLAN"
      type: "huggingface"
      task: "instruction_tuning"
      weight: 1.4
      
    - name: "stanfordnlp/SHP"
      type: "huggingface"
      task: "helpful_harmless"
      weight: 1.3
      
    - name: "Anthropic/Anthropic-RLHF"
      type: "huggingface"
      task: "alignment"
      weight: 1.5
      
  additional_datasets:
    - name: "databricks/databricks-dolly-15k"
      type: "huggingface"
      task: "instruction_following"
      weight: 1.2
      
    - name: "tatsu-lab/alpaca"
      type: "huggingface"
      task: "instruction_following"
      weight: 1.1
      
    - name: "laion/OIG"
      type: "huggingface"
      task: "instruction_diverse"
      weight: 0.9
      streaming: true
      max_samples: 500000
      
    - name: "deepmind/mathematics"
      type: "huggingface"
      task: "math_reasoning"
      weight: 1.2
      
    - name: "codeparrot/github-code"
      type: "huggingface"
      task: "code_generation"
      weight: 1.1
      streaming: true
      max_samples: 500000

# Data Processing
data_processing:
  tokenizer:
    type: "tiktoken"
    model: "cl100k_base"
    max_length: 4096
  preprocessing:
    normalize_unicode: true
    normalize_whitespace: true
    remove_html: true
    min_length: 50
    max_length: 8192
  augmentation:
    enabled: true
    techniques:
      - name: "synonym_replacement"
        probability: 0.1
      - name: "random_insertion"
        probability: 0.05
      - name: "random_deletion"
        probability: 0.05
  batching:
    train_batch_size: 32
    eval_batch_size: 64
    gradient_accumulation_steps: 8
    dynamic_batching: true

# Model Configuration
model:
  architecture: "decoder_only"
  size: "medium"  # Options: small, medium, large
  sizes:
    small:
      n_layers: 12
      n_heads: 12
      d_model: 768
      d_ff: 3072
      max_seq_length: 2048
    medium:
      n_layers: 24
      n_heads: 16
      d_model: 1024
      d_ff: 4096
      max_seq_length: 4096
    large:
      n_layers: 32
      n_heads: 32
      d_model: 2048
      d_ff: 8192
      max_seq_length: 8192
  activation: "gelu"
  dropout: 0.1
  attention:
    type: "flash_attention"
    causal: true
    rotary_embedding: true
  initialization:
    method: "normal"
    std: 0.02

# Training Configuration
training:
  stages:
    - name: "pretraining"
      datasets: ["EleutherAI/pile", "allenai/c4", "openwebtext/openwebtext"]
      epochs: 1
      learning_rate:
        initial: 6.0e-4
        min: 6.0e-5
        schedule: "cosine"
        warmup_steps: 2000
      
    - name: "domain_specific"
      datasets: ["bigcode/the-stack", "codeparrot/github-code", "deepmind/mathematics", "HuggingFaceTB/cosmopedia"]
      epochs: 2
      learning_rate:
        initial: 3.0e-4
        min: 3.0e-5
        schedule: "cosine"
        warmup_steps: 1000
      
    - name: "instruction_tuning"
      datasets: ["HuggingFaceH4/instruction-dataset", "open-orca/OpenOrca", "google-research/FLAN", "databricks/databricks-dolly-15k", "tatsu-lab/alpaca"]
      epochs: 3
      learning_rate:
        initial: 2.0e-4
        min: 2.0e-5
        schedule: "cosine"
        warmup_steps: 500
      
    - name: "rlhf"
      datasets: ["Anthropic/hh-rlhf", "Anthropic/Anthropic-RLHF", "stanfordnlp/SHP"]
      epochs: 1
      learning_rate:
        initial: 1.0e-4
        min: 1.0e-5
        schedule: "cosine"
        warmup_steps: 200
  
  optimizer:
    name: "adamw"
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
    eps: 1.0e-8
    use_8bit: true
  
  mixed_precision: "bf16"
  gradient_checkpointing: true
  gradient_clipping: 1.0
  
  checkpointing:
    save_steps: 1000
    keep_last_n: 3
    save_optimizer_state: true
  
  evaluation:
    eval_steps: 500
    early_stopping:
      enabled: true
      patience: 5
      metric: "average_eval_loss"
      mode: "min"

# Hyperparameter Tuning
hyperparameter_tuning:
  method: "bayesian"
  metric: "average_eval_loss"
  mode: "min"
  n_trials: 20
  parameters:
    learning_rate:
      min: 1.0e-5
      max: 1.0e-3
      log: true
    batch_size:
      values: [16, 32, 64, 128]
    dropout:
      min: 0.0
      max: 0.3
    weight_decay:
      min: 0.0
      max: 0.1
    n_layers:
      min: 8
      max: 32
      step: 4

# Evaluation Configuration
evaluation:
  metrics:
    general:
      - name: "perplexity"
      - name: "token_accuracy"
    code:
      - name: "functional_correctness"
      - name: "pass_at_k"
        k_values: [1, 5, 10]
    dialogue:
      - name: "bleu"
      - name: "rouge"
    qa:
      - name: "accuracy"
      - name: "f1"
      - name: "exact_match"
    reasoning:
      - name: "logical_consistency"
      - name: "step_validity"
  
  benchmarks:
    - name: "humaneval"
      task: "code_generation"
      metric: "pass_at_k"
    - name: "truthfulqa"
      task: "truthfulness"
      metric: "accuracy"
    - name: "mmlu"
      task: "knowledge"
      metric: "accuracy"
    - name: "gsm8k"
      task: "math_reasoning"
      metric: "accuracy"
    - name: "hellaswag"
      task: "commonsense"
      metric: "accuracy"

# Deployment Configuration
deployment:
  flask:
    batch_size: 4
    max_concurrent_requests: 10
    timeout: 30
    cache_size: 100
    async_mode: true
  
  coreml:
    quantization:
      enabled: true
      precision: "int8"
    pruning:
      enabled: true
      method: "magnitude"
      target_sparsity: 0.3
    optimization:
      compute_precision: "float16"
      memory_layout: "gpu_family"
  
  optimization:
    distillation:
      enabled: true
      teacher_model: "large"
      student_model: "small"
      alpha: 0.5
      temperature: 2.0
    quantization:
      enabled: true
      precision: "int8"
    pruning:
      enabled: true
      method: "magnitude"
      target_sparsity: 0.3

# Resource Management
resources:
  kaggle:
    accelerator: "gpu"  # Options: gpu, tpu
    gpu_type: "p100"    # Options: p100, t4, v100
    tpu_type: "v3-8"    # Options: v3-8, v2-8
    memory_optimization:
      gradient_checkpointing: true
      cpu_offloading: true
      activation_recomputation: true
    storage:
      use_bigquery: true
      cache_datasets: true
      compression: true
  
  monitoring:
    enabled: true
    metrics:
      - "gpu_utilization"
      - "memory_usage"
      - "disk_usage"
      - "training_speed"
    alert_thresholds:
      gpu_utilization: 95
      memory_usage: 90
      disk_usage: 85

# Error Handling
error_handling:
  retry:
    max_attempts: 3
    backoff_factor: 2
    max_backoff: 60
  fallbacks:
    dataset_unavailable: "use_cached"
    oom_error: "reduce_batch_size"
    timeout: "checkpoint_and_resume"
  logging:
    level: "INFO"
    file: "training.log"
    console: true