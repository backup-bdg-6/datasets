version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./outputs:/app/outputs
    environment:
      - MODEL_PATH=/app/outputs/checkpoints/model_final.pt
      - TOKENIZER_PATH=/app/outputs/tokenizer/tokenizer.json
      - CONFIG_PATH=/app/outputs/flask_deployment/config.json
      - DEVICE=cuda
      - BATCH_SIZE=8
      - MAX_CACHE_SIZE=1000
      - MAX_SEQUENCE_LENGTH=1024
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - api