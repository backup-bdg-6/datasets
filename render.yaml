# Render.yaml configuration for multi-service deployment
# This configuration is STRICTLY for Render.com's FREE TIER
# No background workers, no persistent disk storage, minimal resources

services:
  # API Service - Handles API requests and coordinates other services
  # FREE TIER WEB SERVICE: Uses minimal resources and ephemeral storage
  - type: web
    name: model-trainer-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT app.api.main:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: MAX_MEMORY_MB
        value: 400  # Stay within free tier memory limits
      - key: STORAGE_DIR
        value: /tmp  # Ephemeral storage only
      - key: PYTHONUNBUFFERED
        value: true
      - key: FREE_TIER
        value: true

  # Training Service - Now as web service since we don't have worker access on free tier
  # FREE TIER WEB SERVICE: Converted from worker to web service for free tier compatibility
  - type: web
    name: model-trainer-training
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT app.services.training_worker:create_flask_app()
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: MAX_MEMORY_MB
        value: 450  # Stay within free tier memory limits
      - key: STORAGE_DIR
        value: /tmp  # Ephemeral storage only
      - key: PYTHONUNBUFFERED
        value: true
      - key: FREE_TIER
        value: true

  # Monitoring Service - Tracks and visualizes training progress
  # FREE TIER WEB SERVICE: Uses minimal resources and ephemeral storage
  - type: web
    name: model-trainer-monitor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT app.services.monitor:app
    healthCheckPath: /monitor/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: MAX_MEMORY_MB
        value: 250  # Stay within free tier memory limits
      - key: STORAGE_DIR
        value: /tmp  # Ephemeral storage only
      - key: PYTHONUNBUFFERED
        value: true
      - key: FREE_TIER
        value: true

  # Frontend Service - Serves the web UI for interaction
  # FREE TIER STATIC SITE VIA WEB SERVICE: Minimal static file serving
  - type: web
    name: model-trainer-frontend
    env: static
    buildCommand: cd app/frontend && npm install && npm run build
    staticPublishPath: ./app/frontend/build
    envVars:
      - key: API_URL
        fromService:
          name: model-trainer-api
          type: web
          property: hostport
      - key: FREE_TIER
        value: true
