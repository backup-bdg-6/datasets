name: Download Datasets and Store with Git LFS

on:
  workflow_dispatch:
    inputs:
      datasets:
        description: 'Comma-separated list of dataset names (e.g., "nvidia/OpenCodeReasoning,openai/openai_humaneval")'
        required: true
        default: 'nvidia/OpenCodeReasoning,openai/openai_humaneval' # Default datasets for manual trigger

jobs:
  download-datasets:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # Set up Git LFS
      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs track "*.jsonl" "*.csv" "*.parquet" "*.txt"

      # Free up disk space by removing unnecessary tools
      - name: Free Up Disk Space
        run: |
          echo "Disk space before cleanup:"
          df -h
          # Remove unnecessary tools and files
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' 'mysql.*' 'postgresql.*'
          sudo apt-get autoremove -y
          sudo apt-get autoclean
          echo "Disk space after cleanup:"
          df -h

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Install dependencies
      - name: Install Dependencies
        run: |
          pip install huggingface_hub psutil

      # Run the download script with the selected datasets
      - name: Download Datasets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # Hugging Face token for gated datasets
          DATASETS_TO_DOWNLOAD: ${{ github.event.inputs.datasets }}
        run: |
          python download_datasets.py
        continue-on-error: true  # Continue even if a dataset fails

      # Monitor disk usage after download
      - name: Check Disk Usage
        run: |
          echo "Final disk usage:"
          df -h
          du -h datasets/ | sort -h

      # Commit and push the datasets
      - name: Commit and Push Datasets
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add datasets/
          git add .gitattributes
          git commit -m "Add downloaded datasets with Git LFS" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}