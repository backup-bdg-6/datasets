name: Download Datasets and Store with Git LFS

on:
  workflow_dispatch:
    inputs:
      nvidia_OpenCodeReasoning:
        description: 'Download nvidia/OpenCodeReasoning'
        type: boolean
        default: false
      open_thoughts_OpenThoughts2_1M:
        description: 'Download open-thoughts/OpenThoughts2-1M'
        type: boolean
        default: false
      AnthAI_values_in_the_wild:
        description: 'Download AnthAI/values-in-the-wild'
        type: boolean
        default: false
      PrimeIntellect_verifiable_coding_problems:
        description: 'Download PrimeIntellect/verifiable-coding-problems'
        type: boolean
        default: false
      DeepNLP_Coding_Agent_GitHub_2025_Feb:
        description: 'Download DeepNLP/Coding-Agent-GitHub-2025-Feb'
        type: boolean
        default: false
      aidando73_llama_coding_agent_evals:
        description: 'Download aidando73/llama-coding-agent-evals'
        type: boolean
        default: false
      openai_openai_humaneval:
        description: 'Download openai/openai_humaneval'
        type: boolean
        default: false
      HumanLLMs_Human_Like_DPO_Dataset:
        description: 'Download HumanLLMs/Human-Like-DPO-Dataset'
        type: boolean
        default: false
      HuggingFaceH4_ultrachat_200k:
        description: 'Download HuggingFaceH4/ultrachat_200k'
        type: boolean
        default: false
      DeepAI_hh_rlhf:
        description: 'Download DeepAI/hh-rlhf'
        type: boolean
        default: false
      xAI_TruthfulQA:
        description: 'Download xAI/TruthfulQA'
        type: boolean
        default: false
      Salesforce_dialogstudio:
        description: 'Download Salesforce/dialogstudio'
        type: boolean
        default: false
      bigcode_the_stack:
        description: 'Download bigcode/the-stack'
        type: boolean
        default: false
      allenai_tool_augmented_dialogues:
        description: 'Download allenai/tool-augmented-dialogues'
        type: boolean
        default: false
      google_research_toolbench:
        description: 'Download google-research/toolbench'
        type: boolean
        default: false
      codeparrot_github_code:
        description: 'Download codeparrot/github-code'
        type: boolean
        default: false
      luahub_lua_code_dataset:
        description: 'Download luahub/lua-code-dataset'
        type: boolean
        default: false
      roblox_luau_code:
        description: 'Download roblox/luau-code'
        type: boolean
        default: false
      swift_code_swift_repos:
        description: 'Download swift-code/swift-repos'
        type: boolean
        default: false
      HuggingFaceH4_codeparrot_ds:
        description: 'Download HuggingFaceH4/codeparrot-ds'
        type: boolean
        default: false
      nuprl_MultiPL_E:
        description: 'Download nuprl/MultiPL-E'
        type: boolean
        default: false
      codeparrot_apps:
        description: 'Download codeparrot/apps'
        type: boolean
        default: false
      HuggingFaceH4_python_codes_25k:
        description: 'Download HuggingFaceH4/python-codes-25k'
        type: boolean
        default: false
      HuggingFaceH4_instruction_dataset:
        description: 'Download HuggingFaceH4/instruction-dataset'
        type: boolean
        default: false
      allenai_dolma:
        description: 'Download allenai/dolma'
        type: boolean
        default: false
      openwebtext_openwebtext:
        description: 'Download openwebtext/openwebtext'
        type: boolean
        default: false

jobs:
  download-datasets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs track "*.jsonl" "*.csv" "*.parquet" "*.txt"

      - name: Free Up Disk Space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' 'mysql.*' 'postgresql.*'
          sudo apt-get autoremove -y
          sudo apt-get autoclean
          echo "Disk space after cleanup:"
          df -h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install huggingface_hub psutil

      - name: Download Selected Datasets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Map inputs to dataset names
          declare -A dataset_map=(
            ["nvidia_OpenCodeReasoning"]="nvidia/OpenCodeReasoning"
            ["open_thoughts_OpenThoughts2_1M"]="open-thoughts/OpenThoughts2-1M"
            ["AnthAI_values_in_the_wild"]="DeepAI/values-in-the-wild"
            ["PrimeIntellect_verifiable_coding_problems"]="PrimeIntellect/verifiable-coding-problems"
            ["DeepNLP_Coding_Agent_GitHub_2025_Feb"]="DeepNLP/Coding-Agent-GitHub-2025-Feb"
            ["aidando73_llama_coding_agent_evals"]="aidando73/llama-coding-agent-evals"
            ["openai_openai_humaneval"]="openai/openai_humaneval"
            ["HumanLLMs_Human_Like_DPO_Dataset"]="HumanLLMs/Human-Like-DPO-Dataset"
            ["HuggingFaceH4_ultrachat_200k"]="HuggingFaceH4/ultrachat_200k"
            ["DeepAI_hh_rlhf"]="DeepAI/hh-rlhf"
            ["xAI_TruthfulQA"]="xAI/TruthfulQA"
            ["Salesforce_dialogstudio"]="Salesforce/dialogstudio"
            ["bigcode_the_stack"]="bigcode/the-stack"
            ["allenai_tool_augmented_dialogues"]="allenai/tool-augmented-dialogues"
            ["google_research_toolbench"]="google-research/toolbench"
            ["codeparrot_github_code"]="codeparrot/github-code"
            ["luahub_lua_code_dataset"]="luahub/lua-code-dataset"
            ["roblox_luau_code"]="roblox/luau-code"
            ["swift_code_swift_repos"]="swift-code/swift-repos"
            ["HuggingFaceH4_codeparrot_ds"]="HuggingFaceH4/codeparrot-ds"
            ["nuprl_MultiPL_E"]="nuprl/MultiPL-E"
            ["codeparrot_apps"]="codeparrot/apps"
            ["HuggingFaceH4_python_codes_25k"]="HuggingFaceH4/python-codes-25k"
            ["HuggingFaceH4_instruction_dataset"]="HuggingFaceH4/instruction-dataset"
            ["allenai_dolma"]="allenai/dolma"
            ["openwebtext_openwebtext"]="openwebtext/openwebtext"
          )

          selected_datasets=()

          # Loop through inputs and populate selected_datasets
          for input_name in "${!dataset_map[@]}"; do
            # Convert input name to environment variable style: INPUT_<uppercase>
            env_var_name="INPUT_${input_name^^}"
            # Check if the input is true
            if [ "${!env_var_name}" == "true" ]; then
              selected_datasets+=("${dataset_map[$input_name]}")
            fi
          done

          if [ ${#selected_datasets[@]} -eq 0 ]; then
            echo "No datasets selected for download. Exiting."
            exit 0
          fi

          echo "Downloading datasets: ${selected_datasets[@]}"

          mkdir -p datasets

          for dataset in "${selected_datasets[@]}"; do
            echo "Downloading dataset: $dataset"
            # Assuming download_datasets.py exists and handles downloading
            python download_datasets.py --dataset "$dataset" || echo "Failed to download $dataset"
          done

      - name: Check Disk Usage
        run: |
          echo "Final disk usage:"
          df -h
          du -sh datasets/ | sort -h

      - name: Commit and Push Datasets
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add datasets/
            git add .gitattributes
            git commit -m "Add downloaded datasets with Git LFS"
            git push
          else
            echo "No changes to commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}